<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfumería Premium & Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #64748b;
            --accent: #0f172a;
            --accent-hover: #334155;
            --border-color: #e2e8f0;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 30px -3px rgba(0, 0, 0, 0.08);
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; scroll-behavior: smooth; }
        button, input, select, textarea { font-family: inherit; outline: none; transition: all 0.3s ease; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.6); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .logo img { height: 45px; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; display: flex; flex-direction: column; gap: 6px; padding: 5px; }
        .menu-btn span { display: block; width: 28px; height: 2px; background-color: var(--text-main); transition: 0.3s; border-radius: 2px; }
        
        .side-menu { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; padding: 80px 25px 30px; display: flex; flex-direction: column; }
        .side-menu.active { right: 0; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 32px; cursor: pointer; border: none; background: none; color: var(--text-main); transition: transform 0.3s; }
        .side-menu a { text-decoration: none; color: var(--text-muted); font-size: 1.1rem; margin: 15px 0; cursor: pointer; transition: all 0.2s; padding: 8px 12px; border-radius: 8px; }
        .side-menu a:hover, .side-menu a.active-link { background: var(--bg-body); color: var(--text-main); font-weight: 600; transform: translateX(5px); }
        
        .admin-link { display: block; background: linear-gradient(135deg, var(--accent), #475569); color: #ffffff !important; padding: 15px; text-align: center; border-radius: var(--radius-md); font-weight: 600; transition: transform 0.3s; }
        
        .btn-submit { background-color: var(--accent); color: #ffffff; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 500; font-size: 1rem; }
        .btn-action { background-color: #f1f5f9; color: #334155; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; margin-left: 5px; }
        .btn-add-row { background: transparent; color: var(--accent); border: 2px dashed var(--border-color); padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 15px; }

        .banner { background: #ffffff; padding: 60px 5%; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 40px; border-bottom: 1px solid var(--border-color); }
        .catalogo { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: var(--bg-card); border-radius: var(--radius-md); padding: 15px; border: 1px solid #f1f5f9; text-align: center; }

        #adminPanel { display: none; background-color: var(--bg-body); min-height: 100vh; padding-bottom: 50px; }
        .admin-header-bar { background: rgba(255, 255, 255, 0.9); display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; border-bottom: 1px solid var(--border-color); }
        .admin-container { padding: 30px 5%; max-width: 1300px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card { background: var(--bg-card); padding: 25px; border-radius: var(--radius-md); border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; }

        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; min-width: 600px; border-collapse: separate; border-spacing: 0; }
        table th, table td { padding: 12px 10px; border-bottom: 1px solid var(--border-color); text-align: left; }
        
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-badge.pagada { background-color: #dcfce7; color: #166534; }
        .status-badge.pendiente { background-color: #fef2f2; color: #b91c1c; }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .metric-box { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px 15px; border-radius: var(--radius-md); text-align: center; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-card); width: 100%; max-width: 500px; border-radius: var(--radius-md); padding: 25px; }
    </style>
</head>
<body>

    <div id="publicSite">
        <header>
            <div class="logo">LOGO</div>
            <button class="menu-btn" onclick="toggleMenu('sideMenu')"><span></span><span></span><span></span></button>
        </header>

        <nav class="side-menu" id="sideMenu">
            <button class="close-btn" onclick="toggleMenu('sideMenu')">&times;</button>
            <a onclick="solicitarAccesoAdmin()" class="admin-link">⚙️ Acceso Admin</a>
        </nav>

        <section class="banner">
            <h1>Esencia & Distinción</h1>
        </section>

        <section class="catalogo" id="grid-Caballeros"></section>
    </div>

    <div id="adminPanel">
        <div class="admin-header-bar">
            <h2>Panel de Control</h2>
            <button class="btn-action" onclick="cerrarSesionAdmin()">Salir</button>
        </div>

        <nav class="side-menu" id="adminSideMenu">
            <button class="close-btn" onclick="toggleMenu('adminSideMenu')">&times;</button>
            <a onclick="switchTab('tab-finanzas', this)" class="active-link">📊 Finanzas</a>
            <a onclick="switchTab('tab-analitica', this)">📉 Analítica & Egresos</a>
        </nav>

        <div class="admin-container">
            <div id="tab-finanzas" class="tab-content active">
                <div class="metrics-grid">
                    <div class="metric-box"><p>Caja</p><h4 id="m-caja">$0.00</h4></div>
                    <div class="metric-box"><p>Ganancia</p><h4 id="m-ganancia">$0.00</h4></div>
                </div>
            </div>

            <div id="tab-analitica" class="tab-content">
                <div class="card">
                    <h3>Registrar Egreso</h3>
                    <form id="withdrawalForm" onsubmit="registrarEgreso(event)">
                        <input type="number" id="wAmount" step="0.01" placeholder="Monto ($)" required>
                        <select id="wType"><option value="Retiro Ganancia">Retiro Ganancia</option><option value="Retiro Costo">Retiro Costo</option></select>
                        <textarea id="wReason" placeholder="Justificación" rows="2" required></textarea>
                        <button type="submit" class="btn-submit">Registrar</button>
                    </form>
                </div>
                <div class="card">
                    <h3>Libro de Egresos</h3>
                    <div class="table-responsive">
                        <table>
                            <thead><tr><th>Fecha</th><th>Tipo</th><th>Monto</th><th>Justificación</th><th>Acción</th></tr></thead>
                            <tbody id="withdrawalsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* Tu configuración */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let appState = { perfumes: [], sales: [], withdrawals: [], logs: [] };
        let currentUser = null;

        function registrarEgreso(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('wAmount').value);
            const type = document.getElementById('wType').value;
            const reason = document.getElementById('wReason').value.trim();
            appState.withdrawals.unshift({ id: 'w_' + Date.now(), date: new Date().toLocaleDateString('es-VE'), type, amount, reason, user: currentUser });
            saveToFirebase();
            document.getElementById('withdrawalForm').reset();
        }

        function eliminarEgreso(index) {
            if (confirm("¿Estás seguro de eliminar este movimiento?")) {
                const item = appState.withdrawals.splice(index, 1)[0];
                appState.logs.unshift({ timestamp: new Date().toLocaleString('es-VE'), user: currentUser, action: `Eliminó egreso de $${item.amount}` });
                saveToFirebase();
                renderAllAdmin();
            }
        }

        function renderAllAdmin() {
            const wBody = document.getElementById('withdrawalsTableBody');
            wBody.innerHTML = '';
            appState.withdrawals.forEach((w, index) => {
                wBody.innerHTML += `<tr>
                    <td>${w.date}</td><td>${w.type}</td>
                    <td style="color:#dc2626;">-$${w.amount.toFixed(2)}</td>
                    <td>${w.reason}</td>
                    <td><button class="btn-action" style="background:#fee2e2;" onclick="eliminarEgreso(${index})">Borrar</button></td>
                </tr>`;
            });
        }

        function saveToFirebase() { db.ref('tienda').set(appState); }
        function toggleMenu(id) { document.getElementById(id).classList.toggle('active'); }
        function switchTab(id, btn) { /* Lógica de tabs */ }
        function solicitarAccesoAdmin() { currentUser = "Admin"; document.getElementById('publicSite').style.display = 'none'; document.getElementById('adminPanel').style.display = 'block'; renderAllAdmin(); }
        function cerrarSesionAdmin() { location.reload(); }

        db.ref('tienda').on('value', (s) => { 
            const d = s.val(); 
            if(d) { appState = d; renderAllAdmin(); } 
        });
    </script>
</body>
</html>
