<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfumería Premium & Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        /* === ESTILOS MANTENIDOS DEL CÓDIGO ORIGINAL === */
        :root {
            --bg-body: #f8f9fa; --bg-card: #ffffff; --text-main: #1a1a1a;
            --text-muted: #64748b; --accent: #0f172a; --accent-hover: #334155;
            --border-color: #e2e8f0; --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 30px -3px rgba(0, 0, 0, 0.08); --radius-md: 12px; --radius-lg: 20px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.6); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .side-menu { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: #fff; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transition: right 0.4s; z-index: 200; padding: 80px 25px; }
        .side-menu.active { right: 0; }
        .btn-submit { background-color: var(--accent); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; }
        .btn-action { background-color: #f1f5f9; color: #334155; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        #adminPanel { display: none; min-height: 100vh; padding-bottom: 50px; }
        .admin-container { padding: 30px 5%; max-width: 1300px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: #fff; padding: 25px; border-radius: var(--radius-md); border: 1px solid var(--border-color); margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    </style>
</head>
<body>

    <div id="publicSite">
        <header>
            <div class="logo">LOGO</div>
            <button class="menu-btn" onclick="toggleMenu('sideMenu')">☰</button>
        </header>
        </div>

    <div id="adminPanel">
        <div class="admin-header-bar"><h2>Centro de Control</h2><button onclick="cerrarSesionAdmin()">Salir</button></div>
        <div class="admin-container">
            <div id="tab-finanzas" class="tab-content active">...</div>
            <div id="tab-analitica" class="tab-content">
                <div class="card">
                    <h3>Registrar Egreso</h3>
                    <form id="withdrawalForm" onsubmit="registrarEgreso(event)">
                        <input type="number" id="wAmount" step="0.01" required placeholder="Monto">
                        <select id="wType"><option value="Retiro Ganancia">Retiro Ganancia</option><option value="Retiro Costo">Retiro Costo</option></select>
                        <textarea id="wReason" placeholder="Justificación" required></textarea>
                        <button type="submit" class="btn-submit">Registrar</button>
                    </form>
                </div>
                <div class="card">
                    <h3>Libro de Egresos</h3>
                    <table>
                        <thead><tr><th>Fecha</th><th>Tipo</th><th>Monto</th><th>Justificación</th><th>Acción</th></tr></thead>
                        <tbody id="withdrawalsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ... (Tu configuración de Firebase original)
        
        // --- FUNCIÓN DE ELIMINACIÓN INTEGRADA AL CÓDIGO ORIGINAL ---
        function eliminarEgreso(index) {
            if (confirm("¿Seguro que deseas eliminar este movimiento?")) {
                appState.withdrawals.splice(index, 1);
                registrarLog("Se eliminó un registro de egreso.");
                saveToFirebase();
                renderAllAdmin();
            }
        }

        // --- ACTUALIZACIÓN DE LA TABLA EN renderAllAdmin ---
        function renderAllAdmin() {
            // ... (resto de cálculos)
            
            const wBody = document.getElementById('withdrawalsTableBody');
            wBody.innerHTML = '';
            appState.withdrawals.forEach((w, index) => {
                wBody.innerHTML += `<tr>
                    <td>${w.date}</td>
                    <td>${w.type}</td>
                    <td>-$${w.amount.toFixed(2)}</td>
                    <td>${w.reason}</td>
                    <td><button class="btn-action" style="background:#fee2e2; color:red;" onclick="eliminarEgreso(${index})">Eliminar</button></td>
                </tr>`;
            });
            // ... (resto de funciones)
        }
        
        // ... (El resto de tus funciones originales intactas)
    </script>
</body>
</html>
