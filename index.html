<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión - Victorstyles</title>
    
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #bfa15f; 
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
            --danger-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-top: 80px; /* Espacio para evitar que la navbar tape el contenido */
        }

        /* NAVBAR Y MENÚ DESPLEGABLE */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .nav-logo {
            color: var(--accent-color);
            font-size: 1.4rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-menu-container {
            position: relative;
            display: inline-block;
        }

        .nav-menu-btn {
            background-color: transparent;
            color: white;
            border: 1px solid var(--accent-color);
            padding: 8px 16px;
            font-size: 0.95rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .nav-menu-btn:hover {
            background-color: var(--accent-color);
            color: var(--primary-color);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 200px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
            border-radius: 4px;
            margin-top: 5px;
            overflow: hidden;
            z-index: 1001;
        }

        .dropdown-content a {
            color: var(--text-color);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border-color);
        }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }

        .dropdown-content a.admin-link {
            font-weight: bold;
            color: #c0392b;
        }

        /* CLASES DE CONTROL DE VISIBILIDAD */
        .hidden {
            display: none !important;
        }

        .show {
            display: block !important;
        }

        /* CONTENEDOR GENERAL */
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .card h2 {
            margin-bottom: 25px;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 8px;
            color: var(--primary-color);
        }

        /* PANEL INTERNO DE ADMINISTRACIÓN */
        .admin-header {
            margin-bottom: 25px;
        }

        .admin-nav {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .btn-tab {
            background: #e0e0e0;
            border: none;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-tab.active {
            background: var(--primary-color);
            color: white;
        }

        .btn-tab.btn-exit {
            background: #95a5a6;
            color: white;
            margin-left: auto;
        }

        /* FORMULARIOS */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 11px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 13px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: var(--accent-color);
        }

        /* ESTADÍSTICAS */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: var(--bg-color);
            padding: 15px;
            text-align: center;
            border-radius: 6px;
            border-left: 4px solid var(--accent-color);
        }

        .stat-number {
            display: block;
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.85rem;
            color: #666;
        }

        /* SECCIÓN DE FILTROS */
        .filters-card h3 {
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .filters-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        @media (min-width: 600px) {
            .filters-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .btn-secondary {
            background: #7f8c8d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* TABLA DE CITAS */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.95rem;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: var(--primary-color);
            color: white;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .btn-delete {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .btn-delete:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">Victorstyles</div>
        <div class="nav-menu-container">
            <button class="nav-menu-btn" id="navMenuBtn">Menú ☰</button>
            <div class="dropdown-content" id="dropdownMenu">
                <a href="#" id="viewClientBtn">Inicio (Reservas)</a>
                <a href="#" id="viewAdminBtn" class="admin-link">Acceso Administrativo</a>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <section id="clientView" class="card">
            <h2>Reservar Nueva Cita</h2>
            <form id="appointmentForm">
                <div class="form-group">
                    <label for="clientName">Nombre del Cliente:</label>
                    <input type="text" id="clientName" required placeholder="Ej. Juan Pérez">
                </div>
                <div class="form-group">
                    <label for="appointmentDate">Fecha:</label>
                    <input type="date" id="appointmentDate" required>
                </div>
                <div class="form-group">
                    <label for="appointmentTime">Hora:</label>
                    <input type="time" id="appointmentTime" required>
                </div>
                <div class="form-group">
                    <label for="barberService">Servicio:</label>
                    <select id="barberService" required>
                        <option value="">Seleccione un servicio</option>
                        <option value="Corte de Cabello">Corte de Cabello</option>
                        <option value="Barba y Perfilado">Barba y Perfilado</option>
                        <option value="Corte + Barba">Corte + Barba (Combo)</option>
                        <option value="Diseño / Líneas">Diseño / Líneas</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Agendar Cita</button>
            </form>
        </section>

        <section id="adminView" class="card hidden">
            <div class="admin-header">
                <h2>Panel de Administración</h2>
                <div class="admin-nav">
                    <button id="adminTabDashboard" class="btn-tab active">Dashboard</button>
                    <button id="adminTabFilters" class="btn-tab">Filtros de Búsqueda</button>
                    <button id="exitAdminBtn" class="btn-tab btn-exit">Salir del Panel</button>
                </div>
            </div>
            
            <div id="adminDashboardContent">
                <div class="stats-container">
                    <div class="stat-box">
                        <span class="stat-number" id="totalAppointments">0</span>
                        <span class="stat-label">Citas Totales</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-number" id="todayAppointments">0</span>
                        <span class="stat-label">Citas para Hoy</span>
                    </div>
                </div>

                <div class="table-responsive">
                    <table id="appointmentsTable">
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Servicio</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="appointmentsTableBody">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="adminFiltersContent" class="hidden">
                <div class="filters-card">
                    <h3>Filtrar y Buscar Citas</h3>
                    <div class="filters-container">
                        <div class="filter-group">
                            <label>Buscar por Texto:</label>
                            <input type="text" id="searchFilter" placeholder="Nombre o servicio...">
                        </div>
                        <div class="filter-group">
                            <label>Filtrar por Fecha:</label>
                            <input type="date" id="dateFilter">
                        </div>
                    </div>
                    <button id="clearFilters" class="btn-secondary">Limpiar Filtros</button>
                </div>
            </div>

        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // Configuración de tu base de datos de Firebase activa
        const firebaseConfig = {
            databaseURL: "https://ep-perfumes-3c4f7-default-rtdb.firebaseio.com/"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const appointmentsRef = database.ref('citas');

        // --- ELEMENTOS DEL DOM ---
        const navMenuBtn = document.getElementById('navMenuBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');
        const viewClientBtn = document.getElementById('viewClientBtn');
        const viewAdminBtn = document.getElementById('viewAdminBtn');

        const clientView = document.getElementById('clientView');
        const adminView = document.getElementById('adminView');

        const adminTabDashboard = document.getElementById('adminTabDashboard');
        const adminTabFilters = document.getElementById('adminTabFilters');
        const exitAdminBtn = document.getElementById('exitAdminBtn');

        const adminDashboardContent = document.getElementById('adminDashboardContent');
        const adminFiltersContent = document.getElementById('adminFiltersContent');

        const appointmentForm = document.getElementById('appointmentForm');
        const appointmentsTableBody = document.getElementById('appointmentsTableBody');
        const totalAppointmentsEl = document.getElementById('totalAppointments');
        const todayAppointmentsEl = document.getElementById('todayAppointments');

        const searchFilter = document.getElementById('searchFilter');
        const dateFilter = document.getElementById('dateFilter');
        const clearFiltersBtn = document.getElementById('clearFilters');

        let allAppointments = []; // Resguardo local para filtrado en tiempo real

        // --- MANEJO DEL MENÚ DESPLEGABLE (NAVBAR) ---
        navMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            dropdownMenu.classList.remove('show');
        });

        // Alternar a la interfaz del Cliente
        viewClientBtn.addEventListener('click', (e) => {
            e.preventDefault();
            clientView.classList.remove('hidden');
            adminView.classList.add('hidden');
            dropdownMenu.classList.remove('show');
        });

        // Alternar al Panel de Administración completo
        viewAdminBtn.addEventListener('click', (e) => {
            e.preventDefault();
            clientView.classList.add('hidden');
            adminView.classList.remove('hidden');
            dropdownMenu.classList.remove('show');
            showAdminTab('dashboard'); // Entra mostrando el Dashboard por defecto
        });

        // --- NAVEGACIÓN INTERNA DEL PANEL DE ADMINISTRACIÓN ---
        function showAdminTab(tabName) {
            if (tabName === 'dashboard') {
                adminTabDashboard.classList.add('active');
                adminTabFilters.classList.remove('active');
                adminDashboardContent.classList.remove('hidden');
                adminFiltersContent.classList.add('hidden');
                renderTable(allAppointments); 
            } else if (tabName === 'filters') {
                adminTabFilters.classList.add('active');
                adminTabDashboard.classList.remove('active');
                adminDashboardContent.classList.add('hidden');
                adminFiltersContent.classList.remove('hidden');
            }
        }

        adminTabDashboard.addEventListener('click', () => showAdminTab('dashboard'));
        adminTabFilters.addEventListener('click', () => showAdminTab('filters'));

        exitAdminBtn.addEventListener('click', () => {
            adminView.classList.add('hidden');
            clientView.classList.remove('hidden');
        });

        // --- REGISTRAR NUEVA CITA (ACCIONADO POR EL CLIENTE) ---
        appointmentForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('clientName').value.trim();
            const date = document.getElementById('appointmentDate').value;
            const time = document.getElementById('appointmentTime').value;
            const service = document.getElementById('barberService').value;

            if (name && date && time && service) {
                const newAppointment = {
                    cliente: name,
                    fecha: date,
                    hora: time,
                    servicio: service,
                    timestamp: Date.now()
                };

                // Guardar en el nodo 'citas' de Firebase
                appointmentsRef.push().set(newAppointment)
                    .then(() => {
                        alert('¡Cita registrada con éxito!');
                        appointmentForm.reset();
                    })
                    .catch((error) => {
                        console.error("Error al registrar: ", error);
                        alert('Error al procesar la reserva.');
                    });
            }
        });

        // --- ESCUCHA DE DATOS EN TIEMPO REAL ---
        appointmentsRef.on('value', (snapshot) => {
            allAppointments = [];
            const data = snapshot.val();

            if (data) {
                Object.keys(data).forEach(key => {
                    allAppointments.push({
                        id: key,
                        ...data[key]
                    });
                });
                
                // Ordenar las citas cronológicamente por fecha y luego por hora
                allAppointments.sort((a, b) => {
                    return a.fecha.localeCompare(b.fecha) || a.hora.localeCompare(b.hora);
                });
            }

            // Actualizar indicadores numéricos siempre
            updateCounters(allAppointments);

            // Refrescar la tabla dependiendo de la sección visible
            if (adminFiltersContent.classList.contains('hidden')) {
                renderTable(allAppointments);
            } else {
                applyFilters(); 
            }
        });

        // --- CONSTRUCCIÓN DINÁMICA DE LA TABLA ---
        function renderTable(appointmentsList) {
            appointmentsTableBody.innerHTML = '';

            if (appointmentsList.length === 0) {
                appointmentsTableBody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No hay registros disponibles.</td></tr>`;
                return;
            }

            appointmentsList.forEach(appointment => {
                const row = document.createElement('tr');
                const [year, month, day] = appointment.fecha.split('-');

                row.innerHTML = `
                    <td><strong>${appointment.cliente}</strong></td>
                    <td>${day}/${month}/${year}</td>
                    <td>${appointment.hora}</td>
                    <td>${appointment.servicio}</td>
                    <td>
                        <button class="btn-delete" onclick="deleteAppointment('${appointment.id}')">Eliminar</button>
                    </td>
                `;
                appointmentsTableBody.appendChild(row);
            });
        }

        // --- CONTROLADORES DE CONTADORES ---
        function getLocalDateString() {
            const today = new Date();
            const offset = today.getTimezoneOffset();
            const localToday = new Date(today.getTime() - (offset * 60 * 1000));
            return localToday.toISOString().split('T')[0];
        }

        function updateCounters(appointmentsList) {
            const todayStr = getLocalDateString();
            const total = appointmentsList.length;
            const todayCount = appointmentsList.filter(app => app.fecha === todayStr).length;

            totalAppointmentsEl.textContent = total;
            todayAppointmentsEl.textContent = todayCount;
        }

        // --- LÓGICA DE FILTRADO INTERNO ---
        function applyFilters() {
            const textQuery = searchFilter.value.toLowerCase();
            const dateQuery = dateFilter.value;

            const filtered = allAppointments.filter(appointment => {
                const matchesText = appointment.cliente.toLowerCase().includes(textQuery) || 
                                    appointment.servicio.toLowerCase().includes(textQuery);
                const matchesDate = dateQuery ? appointment.fecha === dateQuery : true;

                return matchesText && matchesDate;
            });

            renderTable(filtered);
        }

        searchFilter.addEventListener('input', applyFilters);
        dateFilter.addEventListener('change', applyFilters);

        clearFiltersBtn.addEventListener('click', () => {
            searchFilter.value = '';
            dateFilter.value = '';
            applyFilters();
        });

        // --- ACCIÓN ELIMINAR REGISTRO ---
        window.deleteAppointment = function(id) {
            if (confirm('¿Deseas eliminar permanentemente esta cita?')) {
                appointmentsRef.child(id).remove()
                    .then(() => {
                        alert('Cita removida del sistema.');
                    })
                    .catch((error) => {
                        console.error("Error al remover: ", error);
                    });
            }
        };
    </script>
</body>
</html>
