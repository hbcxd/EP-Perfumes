        // === 3. FUNCIÓN MODIFICADA PARA RENDERIZAR CATÁLOGO ===
        function renderAll() {
            const searchTerm = document.getElementById('searchCatalog') ? document.getElementById('searchCatalog').value.toLowerCase().trim() : '';
            let catPerfumes = [...appState.perfumes].sort((a,b) => a.name.localeCompare(b.name));
            
            ['Caballeros', 'Damas', 'Unisex', 'Niños'].forEach(cat => {
                const grid = document.getElementById(`grid-${cat}`);
                if(!grid) return;
                grid.innerHTML = '';
                
                const filtered = catPerfumes.filter(p => p.category === cat && p.name.toLowerCase().includes(searchTerm));
                if(filtered.length === 0) { 
                    grid.innerHTML = `<p style="grid-column: 1 / -1; color: var(--text-muted); text-align: center;">No hay resultados.</p>`; 
                    return; 
                }
                
                // Imagen por defecto si no hay imagen en Supabase
                let defaultImg = cat === 'Caballeros' ? 'caballeros.jpg' : cat === 'Damas' ? 'damas.jpg' : cat === 'Unisex' ? 'unisex.jpg' : 'ninos.jpg';
                
                filtered.forEach(p => { 
                    let btnDisabled = p.stock <= 0 ? 'disabled' : '';
                    let btnText = p.stock <= 0 ? 'Agotado' : 'Añadir al Carrito';
                    let imgSrc = p.imageUrl ? p.imageUrl : defaultImg; // <-- Usa la URL de Supabase o el respaldo

                    grid.innerHTML += `
                    <div class="product-card">
                        <img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/300?text=Sin+Imagen'" class="product-img">
                        <div class="product-title">${p.name}</div>
                        <span class="product-stock">Disp: ${p.stock}</span>
                        <button class="btn-cart-add" ${btnDisabled} onclick="agregarAlCarrito('${p.id}')">${btnText}</button>
                    </div>`; 
                });
            });
        }

        // === 4. FUNCIÓN MODIFICADA PARA GUARDAR PERFUME + SUBIR IMAGEN ===
        async function registrarPerfume(e) { 
            e.preventDefault(); 
            
            const btn = document.getElementById('btnGuardarPerfume');
            const originalBtnText = btn.innerText;
            btn.innerText = 'Subiendo y Guardando...';
            btn.disabled = true;

            try {
                const name = document.getElementById('perfumeName').value.trim(); 
                const category = document.getElementById('perfumeCategory').value; 
                const stockToAdd = parseInt(document.getElementById('perfumeStock').value); 
                const cost = parseFloat(document.getElementById('perfumeCost').value); 
                const price = parseFloat(document.getElementById('perfumePrice').value); 
                
                const imageInput = document.getElementById('perfumeImage');
                const file = imageInput.files[0];
                let finalImageUrl = null;

                // Lógica de Supabase Storage
                if (file) {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
                    const filePath = `${fileName}`; // Se guardará en la raíz del bucket 'perfumes'

                    // 1. Subir archivo a Supabase
                    const { data, error } = await supabase.storage
                        .from('perfumes') // Nombre del bucket en Supabase
                        .upload(filePath, file);

                    if (error) throw error;

                    // 2. Obtener URL pública
                    const { data: publicUrlData } = supabase.storage
                        .from('perfumes')
                        .getPublicUrl(filePath);

                    finalImageUrl = publicUrlData.publicUrl;
                }

                // Lógica de Firebase Realtime Database
                let item = appState.perfumes.find(p => p.name.toLowerCase() === name.toLowerCase()); 
                
                if(item) { 
                    item.stock += stockToAdd; 
                    item.cost = cost; 
                    item.price = price; 
                    if (finalImageUrl) item.imageUrl = finalImageUrl; // Solo actualiza la imagen si subió una nueva
                    registrarLog(`Actualizó '${name}'`); 
                } else { 
                    appState.perfumes.push({ 
                        id: 'p_' + Date.now(), 
                        name, 
                        category, 
                        stock: stockToAdd, 
                        cost, 
                        price, 
                        soldQuantity: 0,
                        imageUrl: finalImageUrl // Guarda la URL generada
                    }); 
                    registrarLog(`Ingresó '${name}'`); 
                } 

                saveToFirebase(); 
                document.getElementById('perfumeForm').reset();
                alert('Producto guardado exitosamente.');

            } catch (error) {
                console.error("Error al guardar:", error);
                alert("Ocurrió un error al guardar el producto o subir la imagen.");
            } finally {
                // Restaurar botón
                btn.innerText = originalBtnText;
                btn.disabled = false;
            }
        }
